version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: oriza-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secure_password
      MONGO_INITDB_DATABASE: oriza
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - oriza-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: oriza-backend
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://admin:secure_password@mongodb:27017/oriza
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_key_change_in_production}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      CORS_ORIGIN: http://localhost:3000,http://frontend:3000
    ports:
      - "5000:5000"
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - oriza-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    image: node:18-alpine
    container_name: oriza-frontend
    working_dir: /app
    command: npm start
    environment:
      API_BASE_URL: http://localhost:5000/api
    ports:
      - "8000:8000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - oriza-network
    depends_on:
      - backend

  redis:
    image: redis:7-alpine
    container_name: oriza-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - oriza-network
    command: redis-server --appendonly yes

volumes:
  mongodb_data:
  redis_data:

networks:
  oriza-network:
    driver: bridge
