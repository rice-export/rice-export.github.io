<!-- GURU TEJA - CATALOG PAGE -->
<section id="catalog-page" class="page" style="padding: 40px 2rem; max-width: 1280px; margin: 0 auto;">
    <h1 style="font-family: 'Noto Serif', serif; font-size: 36px; font-weight: 700; color: #3d2817; margin-bottom: 1rem;">Our Rice Collection</h1>
    <p style="font-size: 16px; color: #6b5147; margin-bottom: 3rem;">Explore our premium rice varieties for wholesale export.</p>
    
    <div style="display: grid; grid-template-columns: 250px 1fr; gap: 2rem;">
        <!-- Filters Sidebar -->
        <aside style="background-color: #f9f9f7; padding: 2rem; border-radius: 0.5rem; height: fit-content;">
            <h3 style="font-family: 'Noto Serif', serif; font-size: 18px; font-weight: 600; color: #3d2817; margin-bottom: 1.5rem;">Filters</h3>
            
            <!-- Rice Type Filter -->
            <div style="margin-bottom: 2rem;">
                <h4 style="font-size: 12px; font-weight: 600; text-transform: uppercase; color: #944600; margin-bottom: 1rem;">Rice Type</h4>
                <label style="display: flex; align-items: center; margin-bottom: 0.75rem; cursor: pointer;">
                    <input type="checkbox" class="filter-checkbox" value="basmati" style="margin-right: 0.5rem; cursor: pointer;"/>
                    <span>Basmati</span>
                </label>
                <label style="display: flex; align-items: center; margin-bottom: 0.75rem; cursor: pointer;">
                    <input type="checkbox" class="filter-checkbox" value="parboiled" style="margin-right: 0.5rem; cursor: pointer;"/>
                    <span>Parboiled</span>
                </label>
                <label style="display: flex; align-items: center; margin-bottom: 0.75rem; cursor: pointer;">
                    <input type="checkbox" class="filter-checkbox" value="jasmine" style="margin-right: 0.5rem; cursor: pointer;"/>
                    <span>Jasmine</span>
                </label>
            </div>
            
            <!-- Grain Length Filter -->
            <div style="margin-bottom: 2rem;">
                <h4 style="font-size: 12px; font-weight: 600; text-transform: uppercase; color: #944600; margin-bottom: 1rem;">Grain Length</h4>
                <label style="display: flex; align-items: center; margin-bottom: 0.75rem; cursor: pointer;">
                    <input type="radio" class="filter-radio" name="grain" value="all" checked style="margin-right: 0.5rem; cursor: pointer;"/>
                    <span>All</span>
                </label>
                <label style="display: flex; align-items: center; margin-bottom: 0.75rem; cursor: pointer;">
                    <input type="radio" class="filter-radio" name="grain" value="extra-long" style="margin-right: 0.5rem; cursor: pointer;"/>
                    <span>Extra Long</span>
                </label>
                <label style="display: flex; align-items: center; margin-bottom: 0.75rem; cursor: pointer;">
                    <input type="radio" class="filter-radio" name="grain" value="long" style="margin-right: 0.5rem; cursor: pointer;"/>
                    <span>Long</span>
                </label>
            </div>
        </aside>

        <!-- Product Grid -->
        <div>
            <!-- Sort Dropdown -->
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <p style="color: #6b5147;"><span id="productCount">0</span> products</p>
                <select name="sortBy" style="padding: 0.5rem; border: 1px solid #d9d5d1; border-radius: 0.125rem; font-size: 14px; cursor: pointer;">
                    <option value="default">Sort by Default</option>
                    <option value="price-low">Price: Low to High</option>
                    <option value="price-high">Price: High to Low</option>
                </select>
            </div>

            <!-- Product Grid -->
            <div id="productGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 2rem;">
                <!-- Products populated by JavaScript -->
            </div>
        </div>
    </div>
</section>
